    <!-- MOBILE FIX SCRIPT -->
    <script>
      /* Mobile Sobre page fix: ensures DOKMOS ENGENHARIA title stays centered */
      (function() {
        var isMobile = function() { return window.innerWidth <= 768; };
        var fixedOnce = false;

        function fixSobreTitle() {
          if (!isMobile()) return;
          var video = document.querySelector('video[src*="about-hero"]');
          if (!video) return;

          var h2s = document.querySelectorAll('h2.font-bold');
          h2s.forEach(function(el) {
            var st = el.getAttribute('style') || '';
            if (st.indexOf('translateX') !== -1) {
              el.style.transform = 'none';
              el.style.textAlign = 'center';
              el.style.width = '100%';
              el.style.display = 'block';
              el.style.marginLeft = 'auto';
              el.style.marginRight = 'auto';
              fixedOnce = true;
            }
          });
        }

        var observer = new MutationObserver(function() {
          fixSobreTitle();
        });

        if (document.body) {
          observer.observe(document.body, { childList: true, subtree: true });
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            observer.observe(document.body, { childList: true, subtree: true });
          });
        }

        setInterval(fixSobreTitle, 200);
        fixSobreTitle();
      })();
    </script>
